<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Site</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🔥 外層（上貼邊） */
.wrapper {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-end; /* 👈 關鍵：貼上面 */
}

/* 🔥 主框 */
.container {
  width: 92%;
  height: 95%; /* 👈 上面貼，下面留 */

  border: 1px solid rgba(255,255,255,0.5);

  display: flex;
  flex-direction: column;
}

/* 🔥 上方導航 */
.top-bar {
  height: 55px;
  border-bottom: 1px solid rgba(255,255,255,0.4);

  display: flex;
  justify-content: space-around;
  align-items: center;
}

/* 🔥 文字按鈕（無框） */
.top-bar a {
  color: rgba(255,255,255,0.7);
  text-decoration: none;

  font-size: 11px;
  letter-spacing: 4px;

  transition: 0.2s;
}

/* hover（很淡） */
.top-bar a:hover {
  color: white;
}

/* 🔥 主畫面 */
.main {
  flex: 1;
  overflow: hidden;
}

/* 🔥 圖片 */
.main img {
  width: 100%;
  height: 100%;

  object-fit: cover;
  object-position: center;
}

/* 🔥 底部 */
.footer {
  height: 40px;
  border-top: 1px solid rgba(255,255,255,0.4);

  display: flex;
  justify-content: center;
  align-items: center;

  color: rgba(255,255,255,0.6);
  font-size: 10px;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="container">

    <div class="top-bar">
      <a href="#">View</a>
      <a href="#">Art</a>
      <a href="#">Weather</a>
      <a href="tools.html">Tools</a>
    </div>

    <div class="main">
      <img src="HBSvna4WYAIT7uE.jpg">
    </div>

    <div class="footer">
      © DOKI
    </div>

  </div>

</div>

</body>
</html>
